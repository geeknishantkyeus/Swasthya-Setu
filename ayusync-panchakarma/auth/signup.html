<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwasthyaSetu - Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #F9F6F0 0%, #E8F5E9 100%);
      min-height: 100vh;
    }
    .signup-card {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 32px;
      padding: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .input-group {
      position: relative;
      margin-bottom: 1rem;
    }
    .input-group i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #2D6A4F;
    }
    .input-group input, .input-group select {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid #E5E7EB;
      border-radius: 12px;
      outline: none;
      font-size: 0.95rem;
    }
    .input-group input:focus, .input-group select:focus {
      border-color: #2D6A4F;
      box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
    }
    .row-2cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .btn-primary {
      width: 100%;
      background: #2D6A4F;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary:hover { background: #1B4332; }
    .btn-google {
      width: 100%;
      background: white;
      padding: 12px;
      border: 1.5px solid #E5E7EB;
      border-radius: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-weight: 500;
      transition: all 0.3s;
    }
    .btn-google:hover {
      border-color: #2D6A4F;
      background: #F9FAFB;
    }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="min-h-screen flex items-center justify-center p-4">
  <div class="signup-card">
    <div class="text-center mb-5">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-3">
        <i class="fas fa-user-plus text-green-700 text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-green-800">Create Account</h1>
      <p class="text-gray-500 text-sm">Start your healing journey</p>
    </div>

    <!-- Email/Password Signup Form -->
    <form id="signupForm">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="name" placeholder="Full Name" required>
      </div>
      <div class="row-2cols">
        <div class="input-group">
          <i class="fas fa-calendar"></i>
          <input type="number" id="age" placeholder="Age" min="1" max="120" required>
        </div>
        <div class="input-group">
          <i class="fas fa-venus-mars"></i>
          <select id="gender" required>
            <option value="">Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="input-group">
        <i class="fas fa-phone"></i>
        <input type="tel" id="mobile" placeholder="Mobile Number" maxlength="10" required>
      </div>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Email Address" required>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password" required>
      </div>
      <div class="input-group">
        <i class="fas fa-check-circle"></i>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      </div>
      <div class="mb-4">
        <label class="flex items-center">
          <input type="checkbox" id="terms" required class="mr-2">
          <span class="text-sm text-gray-600">I agree to Terms & Conditions</span>
        </label>
      </div>
      <button type="submit" class="btn-primary">Sign Up</button>
    </form>

    <!-- Divider -->
    <div class="flex items-center my-6">
      <div class="flex-1 border-t border-gray-200"></div>
      <span class="px-4 text-gray-400 text-sm">OR</span>
      <div class="flex-1 border-t border-gray-200"></div>
    </div>

    <!-- Google Signup Button - DIRECT SIGNUP -->
    <button id="googleSignupBtn" class="btn-google">
      <i class="fab fa-google text-red-500 text-lg"></i>
      Sign up with Google
    </button>

    <p class="text-center text-gray-600 text-sm mt-6">
      Already have an account? 
      <a href="login.html" class="text-green-600 font-semibold">Login</a>
    </p>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAy-Vll5zjBMEKzri69rU-smmwn1eib53I",
    authDomain: "veetax-1a2ff.firebaseapp.com",
    databaseURL: "https://veetax-1a2ff-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "veetax-1a2ff",
    storageBucket: "veetax-1a2ff.firebasestorage.app",
    messagingSenderId: "984393005565",
    appId: "1:984393005565:web:9ea943e0dbf7c0eb108194"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.innerHTML = `<div class="bg-${type === 'success' ? 'green' : 'red'}-500 text-white px-4 py-2 rounded-lg shadow-lg" style="animation: slideIn 0.3s ease;">${message}</div>`;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 3000);
  }

  // Email/Password Signup
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const name = document.getElementById('name').value.trim();
    const age = document.getElementById('age').value;
    const gender = document.getElementById('gender').value;
    const mobile = document.getElementById('mobile').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const terms = document.getElementById('terms').checked;

    if (!name || !age || !gender || !mobile || !email || !password) {
      showToast('Please fill all fields', 'error');
      return;
    }
    if (password !== confirmPassword) {
      showToast('Passwords do not match', 'error');
      return;
    }
    if (password.length < 6) {
      showToast('Password must be at least 6 characters', 'error');
      return;
    }
    if (!terms) {
      showToast('Please agree to Terms & Conditions', 'error');
      return;
    }

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      
      await setDoc(doc(db, 'users', user.uid), {
        name: name,
        age: parseInt(age),
        gender: gender,
        mobile: mobile,
        email: email,
        role: 'patient',
        createdAt: new Date().toISOString(),
        authProvider: 'email'
      });
      
      showToast('Account created! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = '../patient/new-dashboard.html';
      }, 1500);
      
    } catch (error) {
      let message = 'Signup failed. Try again.';
      if (error.code === 'auth/email-already-in-use') message = 'Email already registered.';
      showToast(message, 'error');
    }
  });

  // DIRECT GOOGLE SIGNUP - One click
  document.getElementById('googleSignupBtn').addEventListener('click', async () => {
    try {
      const result = await signInWithPopup(auth, googleProvider);
      const user = result.user;
      
      // Check if user already exists in Firestore
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      
      if (!userDoc.exists()) {
        // New Google user - save to Firestore
        const displayName = user.displayName || user.email.split('@')[0];
        await setDoc(doc(db, 'users', user.uid), {
          name: displayName,
          email: user.email,
          photoURL: user.photoURL || null,
          role: 'patient',
          createdAt: new Date().toISOString(),
          authProvider: 'google'
        });
      }
      
      showToast('Google signup successful! Redirecting...', 'success');
      
      setTimeout(() => {
        window.location.href = '../patient/new-dashboard.html';
      }, 1500);
      
    } catch (error) {
      console.error('Google Signup Error:', error);
      showToast('Google signup failed. Please try again.', 'error');
    }
  });
</script>

</body>
</html>
