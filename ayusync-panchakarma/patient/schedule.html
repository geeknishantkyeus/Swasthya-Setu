<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Appointment | SwasthyaSetu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2D6A4F;
            --light-green: #74C69D;
            --cream: #F9F6F0;
        }
        body {
            background: linear-gradient(135deg, var(--cream) 0%, #E8F5E9 100%);
            min-height: 100vh;
        }
        .schedule-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            transition: transform 0.3s ease;
        }
        .schedule-card:hover {
            transform: translateY(-5px);
        }
        .time-slot {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid #E5E7EB;
            background: white;
            border-radius: 16px;
            padding: 12px 16px;
            text-align: center;
        }
        .time-slot:hover {
            border-color: var(--light-green);
            transform: translateY(-2px);
        }
        .time-slot.selected {
            border-color: var(--primary-green);
            background: #F0FDF4;
            color: var(--primary-green);
        }
        .time-slot.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #F3F4F6;
        }
        .step-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #E5E7EB;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 8px;
            font-weight: bold;
            color: #9CA3AF;
        }
        .step-dot.active {
            background: var(--primary-green);
            color: white;
        }
        .step-dot.completed {
            background: var(--primary-green);
            color: white;
        }
        .date-picker {
            border: 2px solid #E5E7EB;
            border-radius: 16px;
            padding: 12px 16px;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
        }
        .date-picker:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="bg-white shadow-md fixed top-0 left-0 w-full z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="new-dashboard.html" class="flex items-center gap-2">
            <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center text-white font-bold">SS</div>
            <span class="text-xl font-bold text-green-800">SwasthyaSetu</span>
        </a>
        <div class="hidden md:flex gap-6">
            <a href="main-dashboard.html" class="text-gray-700 hover:text-green-600">Dashboard</a>
            <a href="problem-selection.html" class="text-gray-700 hover:text-green-600">New Consultation</a>
            <button onclick="logout()" class="text-red-500 hover:text-red-700">Logout</button>
        </div>
    </div>
</nav>
<div class="pt-20"></div>

<main class="max-w-4xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="text-center mb-10 animate-fade-in">
        <h1 class="text-3xl md:text-4xl font-bold text-green-800 mb-4">
            📅 Schedule Your Appointment
        </h1>
        
        <!-- Step Indicator -->
        <div class="flex justify-center items-center mb-6">
            <div class="step-dot completed">✓</div>
            <div class="w-12 h-0.5 bg-green-500"></div>
            <div class="step-dot completed">✓</div>
            <div class="w-12 h-0.5 bg-green-500"></div>
            <div class="step-dot completed">✓</div>
            <div class="w-12 h-0.5 bg-green-500"></div>
            <div class="step-dot active">4</div>
        </div>
    </div>

    <!-- Main Schedule Card -->
    <div class="schedule-card animate-fade-in">
        <!-- Doctor Info -->
        <div id="doctorInfo" class="mb-8 p-4 bg-green-50 rounded-2xl">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-green-600 rounded-full flex items-center justify-center text-3xl shadow-md" id="doctorAvatar">
                    👨‍⚕️
                </div>
                <div>
                    <h2 class="text-xl font-bold text-green-800" id="doctorName">Loading doctor details...</h2>
                    <p class="text-gray-600" id="doctorSpecialization"></p>
                    <p class="text-sm text-gray-500 mt-1" id="doctorLocation"></p>
                </div>
            </div>
        </div>

        <!-- Treatment Summary -->
        <div class="mb-8 p-4 bg-gray-50 rounded-2xl">
            <h3 class="font-semibold text-gray-700 mb-2">Treatment Summary</h3>
            <p class="text-gray-600" id="treatmentSummary">Loading...</p>
        </div>

        <!-- Date Selection -->
        <div class="mb-8">
            <label class="block text-gray-700 font-semibold mb-3">
                <i class="fas fa-calendar-alt text-green-600 mr-2"></i>Select Date
            </label>
            <input type="date" id="datePicker" class="date-picker">
            <p class="text-xs text-gray-500 mt-2">Available for next 30 days</p>
        </div>

        <!-- Time Slots -->
        <div class="mb-8">
            <label class="block text-gray-700 font-semibold mb-3">
                <i class="fas fa-clock text-green-600 mr-2"></i>Select Time Slot
            </label>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="timeSlots">
                <div class="col-span-full text-center py-4 text-gray-500">Please select a date first</div>
            </div>
        </div>

        <!-- Emergency Priority -->
        <div class="mb-8 p-4 border border-orange-200 rounded-2xl bg-orange-50">
            <label class="flex items-center gap-3 cursor-pointer">
                <input type="checkbox" id="emergencyPriority" class="w-5 h-5 text-red-500">
                <div>
                    <span class="font-semibold text-orange-700">⚠️ I need urgent care</span>
                    <p class="text-xs text-orange-600 mt-1">You will be added to priority queue. Practitioner will see you first.</p>
                </div>
            </label>
        </div>

        <!-- Booking Summary -->
        <div class="mb-8 p-4 bg-green-50 rounded-2xl" id="bookingSummary" style="display: none;">
            <h3 class="font-semibold text-green-800 mb-2">Booking Summary</h3>
            <div class="space-y-1 text-sm">
                <p><span class="text-gray-600">Doctor:</span> <span id="summaryDoctor" class="font-medium"></span></p>
                <p><span class="text-gray-600">Date:</span> <span id="summaryDate" class="font-medium"></span></p>
                <p><span class="text-gray-600">Time:</span> <span id="summaryTime" class="font-medium"></span></p>
                <p><span class="text-gray-600">Fees:</span> <span id="summaryFees" class="font-medium text-green-700"></span></p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <button onclick="window.location.href='doctor-selection.html'" class="px-6 py-3 border-2 border-gray-300 rounded-full text-gray-700 hover:bg-gray-50 transition">
                ← Back to Doctors
            </button>
            <button id="confirmBookingBtn" class="px-8 py-3 bg-green-600 text-white rounded-full font-semibold hover:bg-green-700 transition shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                Confirm & Proceed to Payment →
            </button>
        </div>
    </div>
</main>

<script>
    // Toast function
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `fixed top-24 right-4 z-50 px-4 py-3 rounded-lg text-white ${type === 'error' ? 'bg-red-500' : 'bg-green-500'} shadow-lg`;
        toast.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'} mr-2"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function logout() {
        localStorage.clear();
        window.location.href = '../auth/login.html';
    }

    // Global variables
    let selectedDoctor = null;
    let treatmentPlan = null;
    let selectedDate = '';
    let selectedTime = '';
    let isEmergency = false;

    // Available time slots
    const availableSlots = ["09:00 AM", "10:30 AM", "02:00 PM", "04:30 PM", "06:00 PM"];

    document.addEventListener('DOMContentLoaded', function() {
        console.log("Schedule Page Loaded");
        
        // Load data from localStorage
        const savedDoctor = localStorage.getItem('selectedDoctor');
        const savedTreatment = localStorage.getItem('treatmentPlan');
        const userSelection = JSON.parse(localStorage.getItem('userSelection') || '{}');
        
        // Get selected doctor
        if (savedDoctor) {
            selectedDoctor = JSON.parse(savedDoctor);
            console.log("Doctor loaded:", selectedDoctor);
        } else {
            // Try to get from recommendation result
            const recommendationResult = JSON.parse(localStorage.getItem('recommendationResult') || '{}');
            if (recommendationResult.selectedDoctor) {
                selectedDoctor = recommendationResult.selectedDoctor;
            }
        }
        
        // Get treatment plan
        if (savedTreatment) {
            treatmentPlan = JSON.parse(savedTreatment);
        } else {
            treatmentPlan = {
                type: userSelection.selectedOption || 'AYURVEDA',
                therapy: userSelection.selectedOption === 'AYURVEDA' ? 'Panchakarma Therapy' : 'Modern Medicine',
                symptoms: userSelection.symptoms || ['Health Consultation']
            };
        }
        
        // If no doctor data, show error and redirect
        if (!selectedDoctor) {
            showToast('No doctor selected. Please go back and select a doctor.', 'error');
            setTimeout(() => {
                window.location.href = 'doctor-selection.html';
            }, 2000);
            return;
        }
        
        // Display doctor info
        document.getElementById('doctorName').innerText = selectedDoctor.name;
        document.getElementById('doctorSpecialization').innerText = selectedDoctor.specialization;
        document.getElementById('doctorLocation').innerHTML = `<i class="fas fa-map-marker-alt text-red-400 mr-1"></i>${selectedDoctor.location}`;
        document.getElementById('doctorAvatar').innerText = selectedDoctor.image || (treatmentPlan?.type === 'AYURVEDA' ? '👩‍⚕️' : '👨‍⚕️');
        
        // Display treatment summary
        const therapyName = treatmentPlan?.therapy || 
            (treatmentPlan?.type === 'AYURVEDA' ? 'Ayurveda Treatment' : 'Modern Medicine');
        const symptoms = treatmentPlan?.symptoms?.join(', ') || userSelection.symptoms?.join(', ') || 'Health Consultation';
        
        document.getElementById('treatmentSummary').innerHTML = `
            <i class="fas ${treatmentPlan?.type === 'AYURVEDA' ? 'fa-leaf text-green-600' : 'fa-hospital text-blue-600'} mr-2"></i>
            <strong>${therapyName}</strong><br>
            <span class="text-sm">For: ${symptoms}</span>
        `;
        
        // Setup date picker
        const datePicker = document.getElementById('datePicker');
        const today = new Date();
        const maxDate = new Date();
        maxDate.setDate(maxDate.getDate() + 30);
        
        datePicker.min = today.toISOString().split('T')[0];
        datePicker.max = maxDate.toISOString().split('T')[0];
        
        // Date change handler
        datePicker.addEventListener('change', function() {
            selectedDate = this.value;
            if (selectedDate) {
                enableTimeSlots();
                updateBookingSummary();
            }
        });
        
        // Emergency checkbox handler
        const emergencyCheckbox = document.getElementById('emergencyPriority');
        emergencyCheckbox.addEventListener('change', function() {
            isEmergency = this.checked;
            updateBookingSummary();
        });
        
        // Confirm booking button
        const confirmBtn = document.getElementById('confirmBookingBtn');
        confirmBtn.addEventListener('click', function() {
            if (!selectedDate) {
                showToast('Please select a date', 'error');
                return;
            }
            if (!selectedTime) {
                showToast('Please select a time slot', 'error');
                return;
            }
            
            // Create booking object
            const booking = {
                id: 'BOOK_' + Date.now(),
                doctor: selectedDoctor,
                treatment: treatmentPlan,
                date: selectedDate,
                time: selectedTime,
                isEmergency: isEmergency,
                fees: selectedDoctor.fees,
                status: 'confirmed',
                createdAt: new Date().toISOString()
            };
            
            // Save to localStorage
            const existingBookings = JSON.parse(localStorage.getItem('userBookings') || '[]');
            existingBookings.push(booking);
            localStorage.setItem('userBookings', JSON.stringify(existingBookings));
            localStorage.setItem('currentBooking', JSON.stringify(booking));
            
            showToast('Appointment scheduled! Redirecting to payment...', 'success');
            
            setTimeout(() => {
                window.location.href = 'payment.html';
            }, 1500);
        });
    });
    
    function enableTimeSlots() {
        const slotsContainer = document.getElementById('timeSlots');
        slotsContainer.innerHTML = '';
        
        availableSlots.forEach(slot => {
            const slotBtn = document.createElement('div');
            slotBtn.className = 'time-slot';
            slotBtn.innerText = slot;
            
            // Random availability (for demo)
            const isAvailable = Math.random() > 0.3;
            if (!isAvailable) {
                slotBtn.classList.add('disabled');
                slotBtn.innerText += ' (Full)';
            } else {
                slotBtn.onclick = () => selectTimeSlot(slot, slotBtn);
            }
            
            slotsContainer.appendChild(slotBtn);
        });
    }
    
    function selectTimeSlot(time, element) {
        // Remove selection from all slots
        document.querySelectorAll('.time-slot').forEach(slot => {
            slot.classList.remove('selected');
        });
        
        // Add selection to clicked slot
        element.classList.add('selected');
        selectedTime = time;
        
        updateBookingSummary();
        showToast(`${time} selected`, 'success');
    }
    
    function updateBookingSummary() {
        const summaryDiv = document.getElementById('bookingSummary');
        if (selectedDate && selectedTime) {
            summaryDiv.style.display = 'block';
            document.getElementById('summaryDoctor').innerText = selectedDoctor.name;
            document.getElementById('summaryDate').innerText = selectedDate;
            document.getElementById('summaryTime').innerText = selectedTime;
            document.getElementById('summaryFees').innerHTML = `₹${selectedDoctor.fees.toLocaleString()} ${isEmergency ? '<span class="text-orange-600 text-xs ml-2">(Priority Queue)</span>' : ''}`;
        } else {
            summaryDiv.style.display = 'none';
        }
    }
    
    // Helper function to format date
    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    }
</script>

</body>
</html>
