<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Dashboard | SwasthyaSetu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/common.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary-green: #2D6A4F; --light-green: #74C69D; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); font-family: 'Segoe UI', sans-serif; }
        .appointment-card { transition: all 0.3s; }
        .appointment-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-7xl mx-auto px-6 py-8">
        <!-- Welcome Banner -->
        <div class="bg-gradient-to-r from-[var(--primary-green)] to-[var(--light-green)] text-white rounded-4xl p-12 text-center mb-12 shadow-2xl">
            <h1 class="text-5xl font-black mb-6">Welcome Back!</h1>
            <p class="text-2xl opacity-90 mb-8">Your healing journey is active. Here's what's next.</p>
            <div class="flex justify-center gap-8 text-xl">
                <a href="problem-selection.html" class="bg-white text-[var(--primary-green)] px-8 py-4 rounded-3xl font-bold hover:bg-gray-100 transition-all">+ New Consultation</a>
            </div>
        </div>

        <!-- Active Appointments -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div class="bg-white rounded-4xl p-8 shadow-2xl border border-green-200">
                <h2 class="text-3xl font-bold text-[var(--primary-green)] mb-6 flex items-center gap-3">
                    <i class="fas fa-clock text-yellow-500"></i>Upcoming Appointments
                </h2>
                <div id="appointmentsList">
                    <!-- Dynamic appointments -->
                </div>
            </div>
            
            <div class="bg-white rounded-4xl p-8 shadow-2xl border border-blue-200">
                <h2 class="text-3xl font-bold text-blue-700 mb-6 flex items-center gap-3">
                    <i class="fas fa-chart-line text-green-500"></i>Progress Tracking
                </h2>
                <div class="space-y-6">
                    <div class="p-6 bg-gradient-to-r from-green-50 to-emerald-50 rounded-3xl">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="w-12 h-12 bg-green-400 rounded-2xl flex items-center justify-center text-white font-bold text-xl">1</div>
                            <span class="text-2xl font-bold text-green-800">Kati Basti Session</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-4">
                            <div class="bg-gradient-to-r from-green-400 to-green-600 h-4 rounded-full w-40%" style="animation: progress 2s ease-in-out;"></div>
                        </div>
                        <p class="text-sm text-green-700 mt-2">Session 2 of 7 • Next: Tomorrow 10:30 AM</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Booked History -->
        <div class="bg-white rounded-4xl p-8 shadow-2xl">
            <h2 class="text-3xl font-bold text-[var(--primary-green)] mb-8 flex items-center gap-3">
                <i class="fas fa-history text-gray-500"></i>Booking History
            </h2>
            <div id="historyList" class="space-y-4">
                <!-- Dynamic history -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bookings = JSON.parse(localStorage.getItem('userBookings') || '[]');
            const currentBooking = JSON.parse(localStorage.getItem('currentBooking') || '{}');
            
            if (bookings.length === 0 && Object.keys(currentBooking).length === 0) {
                showToast('No bookings found. Start your first consultation!', 'info');
                return;
            }
            
            // Upcoming appointments
            const upcomingList = document.getElementById('appointmentsList');
            if (currentBooking.doctor) {
                upcomingList.innerHTML = `
                    <div class="appointment-card p-8 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-3xl border-l-8 border-blue-400 shadow-xl mb-6">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-2xl font-bold">${currentBooking.treatment}</h3>
                            <span class="px-4 py-2 bg-blue-100 text-blue-800 rounded-full text-sm font-bold">UPCOMING</span>
                        </div>
                        <div class="grid grid-cols-2 gap-6 text-lg">
                            <div>
                                <div class="flex items-center gap-2 mb-1"><i class="fas fa-user-md text-blue-500"></i>${currentBooking.doctor.name}</div>
                                <div class="text-sm text-gray-600">${currentBooking.doctor.specialization}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-bold text-blue-600">${currentBooking.date}</div>
                                <div class="text-lg">${currentBooking.time}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // History
            const historyList = document.getElementById('historyList');
            if (bookings.length > 0) {
                historyList.innerHTML = bookings.slice(-3).map(booking => `
                    <div class="appointment-card p-6 border border-gray-200 rounded-3xl hover:shadow-lg transition-all">
                        <div class="flex items-center justify-between mb-3">
                            <span class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-xs font-bold">${booking.treatment}</span>
                            <span class="text-sm text-gray-500">${booking.bookingId}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4 text-sm">
                            <div><i class="fas fa-calendar text-gray-400 mr-2"></i>${booking.date}</div>
                            <div><i class="fas fa-clock text-gray-400 mr-2"></i>${booking.time}</div>
                            <div><i class="fas fa-map-marker-alt text-gray-400 mr-2"></i>${booking.location}</div>
                            <div class="font-bold text-[var(--primary-green)]">₹${booking.fees.toLocaleString()}</div>
                        </div>
                        <button onclick="cancelBooking('${booking.bookingId}')" class="mt-3 text-red-500 hover:text-red-700 text-sm font-medium flex items-center gap-1">
                            <i class="fas fa-trash"></i> Cancel
                        </button>
                    </div>
                `).join('');
            } else {
                historyList.innerHTML = '<p class="text-center text-gray-500 py-12">No previous bookings. Your journey starts now!</p>';
            }
        });
        
        function cancelBooking(id) {
            if (confirm('Cancel this booking?')) {
                const bookings = JSON.parse(localStorage.getItem('userBookings') || '[]');
                const updated = bookings.filter(b => b.bookingId !== id);
                localStorage.setItem('userBookings', JSON.stringify(updated));
                showToast('Booking cancelled');
                setTimeout(() => location.reload(), 1000);
            }
        }
    </script>
</body>
</html>
