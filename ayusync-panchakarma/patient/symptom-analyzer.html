<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symptom Analyzer - Step 1 of 3 | SwasthyaSetu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2D6A4F;
            --light-green: #74C69D;
            --cream: #F9F6F0;
            --dark-green: #1B4332;
            --emergency-red: #E63946;
        }
        body { background-color: var(--cream); color: #333; font-family: 'Segoe UI', system-ui; }
        .toast { position: fixed; top: 20px; right: 20px; z-index: 1000; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <!-- Toast -->
    <div id="toast" class="toast hidden bg-green-500 text-white px-6 py-4 rounded-xl shadow-2xl transform translate-x-full transition-all duration-300"></div>

    <!-- Header -->
    <header class="bg-white/90 backdrop-blur-xl shadow-lg rounded-2xl p-4 mb-8 max-w-4xl mx-auto">
        <div class="flex items-center justify-between">
            <a href="dashboard.html" class="text-2xl font-bold text-[var(--primary-green)] hover:scale-110 transition-transform">
                <i class="fas fa-arrow-left"></i> Back
            </a>
            <div class="text-xl font-semibold text-gray-700 bg-green-100 px-4 py-2 rounded-xl">Step 1 of 3</div>
            <div class="w-24"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto space-y-8">
        <!-- Progress -->
        <div class="text-center">
            <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-[var(--primary-green)] to-[var(--light-green)] bg-clip-text text-transparent mb-4">
                <i class="fas fa-stethoscope"></i> Symptom Analyzer
            </h1>
            <div class="w-full bg-gray-200 rounded-full h-3">
                <div class="bg-[var(--primary-green)] h-3 rounded-full w-1/3 shadow-lg"></div>
            </div>
        </div>

        <!-- Demo Button -->
        <div class="bg-white shadow-xl rounded-3xl p-6 border-4 border-[var(--primary-green)]/20 max-w-md mx-auto">
            <button id="demoBtn" class="w-full bg-[var(--light-green)] hover:bg-[var(--primary-green)] text-white font-bold py-4 px-6 rounded-2xl text-lg transition-all shadow-lg hover:shadow-xl hover:scale-105">
                <i class="fas fa-magic"></i> Load Demo Data
            </button>
        </div>

        <form id="symptomForm">
            <!-- Symptoms Grid -->
            <div class="bg-white shadow-2xl rounded-3xl p-8 border border-[var(--primary-green)]/10">
                <h2 class="text-3xl font-bold text-[var(--primary-green)] mb-8 flex items-center gap-3">
                    <i class="fas fa-list-ul"></i> Select Symptoms
                </h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button type="button" class="symptom-btn p-6 rounded-2xl border-3 border-gray-200 hover:border-[var(--light-green)] hover:shadow-xl transition-all flex flex-col items-center text-xl font-semibold h-32" data-symptom="Joint Pain">
                        <span class="text-4xl mb-2">🦴</span> Joint Pain
                    </button>
                    <button type="button" class="symptom-btn p-6 rounded-2xl border-3 border-gray-200 hover:border-[var(--light-green)] hover:shadow-xl transition-all flex flex-col items-center text-xl font-semibold h-32" data-symptom="Stress/Anxiety">
                        <span class="text-4xl mb-2">😮‍💨</span> Stress/Anxiety
                    </button>
                    <button type="button" class="symptom-btn p-6 rounded-2xl border-3 border-gray-200 hover:border-[var(--light-green)] hover:shadow-xl transition-all flex flex-col items-center text-xl font-semibold h-32" data-symptom="Digestion">
                        <span class="text-4xl mb-2">🤢</span> Digestion
                    </button>
                    <button type="button" class="symptom-btn p-6 rounded-2xl border-3 border-gray-200 hover:border-[var(--light-green)] hover:shadow-xl transition-all flex flex-col items-center text-xl font-semibold h-32" data-symptom="Sleep">
                        <span class="text-4xl mb-2">😴</span> Sleep
                    </button>
                    <button type="button" class="symptom-btn p-6 rounded-2xl border-3 border-gray-200 hover:border-[var(--light-green)] hover:shadow-xl transition-all flex flex-col items-center text-xl font-semibold h-32" data-symptom="Respiratory">
                        <span class="text-4xl mb-2">🫁</span> Respiratory
                    </button>
                    <button type="button" class="symptom-btn p-6 rounded-2xl border-3 border-gray-200 hover:border-[var(--light-green)] hover:shadow-xl transition-all flex flex-col items-center text-xl font-semibold h-32" data-symptom="Skin">
                        <span class="text-4xl mb-2">💆</span> Skin
                    </button>
                    <button type="button" class="symptom-btn p-6 rounded-2xl border-3 border-gray-200 hover:border-[var(--light-green)] hover:shadow-xl transition-all flex flex-col items-center text-xl font-semibold h-32" data-symptom="Detox">
                        <span class="text-4xl mb-2">🔥</span> Detox
                    </button>
                    <button type="button" class="symptom-btn p-6 rounded-2xl border-3 border-gray-200 hover:border-[var(--light-green)] hover:shadow-xl transition-all flex flex-col items-center text-xl font-semibold h-32" data-symptom="Fatigue">
                        <span class="text-4xl mb-2">⚡</span> Fatigue
                    </button>
                </div>
                <p id="symptomCount" class="mt-4 text-lg font-semibold text-gray-600">No symptoms selected</p>
            </div>

            <!-- Description -->
            <div class="bg-white shadow-2xl rounded-3xl p-8 border border-[var(--primary-green)]/10">
                <label class="block text-2xl font-bold text-[var(--primary-green)] mb-6">
                    📝 Detailed Description
                </label>
                <textarea id="description" rows="4" class="w-full p-6 border-2 border-gray-200 rounded-2xl focus:border-[var(--primary-green)] focus:ring-4 focus:ring-[var(--light-green)]/30 text-lg resize-vertical transition-all shadow-lg" placeholder="Describe your symptoms in detail..."></textarea>
            </div>

            <!-- Duration & Severity -->
            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-white shadow-2xl rounded-3xl p-8 border border-[var(--primary-green)]/10">
                    <label class="block text-2xl font-bold text-[var(--primary-green)] mb-6 flex items-center gap-3">
                        <i class="fas fa-clock"></i> Duration
                    </label>
                    <select id="duration" class="w-full p-6 border-2 border-gray-200 rounded-2xl focus:border-[var(--primary-green)] focus:ring-4 focus:ring-[var(--light-green)]/30 text-lg shadow-lg">
                        <option value="">Select duration</option>
                        <option value="Less than 1 week">Less than 1 week</option>
                        <option value="1-2 weeks">1-2 weeks</option>
                        <option value="2-4 weeks">2-4 weeks</option>
                        <option value="1-3 months">1-3 months</option>
                        <option value="3+ months">3+ months</option>
                    </select>
                </div>
                <div class="bg-white shadow-2xl rounded-3xl p-8 border border-[var(--primary-green)]/10">
                    <label class="block text-2xl font-bold text-[var(--primary-green)] mb-6 flex items-center gap-3">
                        <i class="fas fa-exclamation-triangle"></i> Severity
                    </label>
                    <select id="severity" class="w-full p-6 border-2 border-gray-200 rounded-2xl focus:border-[var(--primary-green)] focus:ring-4 focus:ring-[var(--light-green)]/30 text-lg shadow-lg">
                        <option value="">Select severity</option>
                        <option value="Mild (1-3)">Mild (1-3)</option>
                        <option value="Moderate (4-6)">Moderate (4-6)</option>
                        <option value="Severe (7-10)">Severe (7-10)</option>
                    </select>
                </div>
            </div>

            <!-- Emergency -->
            <div class="bg-red-50 border-4 border-[var(--emergency-red)]/20 shadow-2xl rounded-3xl p-8">
                <h3 class="text-3xl font-bold text-[var(--emergency-red)] mb-6 flex items-center gap-3">
                    <i class="fas fa-exclamation-circle"></i> ⚠️ Emergency Symptoms
                </h3>
                <div class="grid md:grid-cols-2 gap-4">
                    <label class="flex items-center p-4 bg-white rounded-2xl border-2 border-red-200 hover:border-[var(--emergency-red)] cursor-pointer transition-all shadow-lg">
                        <input type="checkbox" name="emergency" value="Chest Pain" class="w-6 h-6 text-[var(--emergency-red)] rounded-lg mr-4">
                        <span class="text-xl font-semibold text-red-700">Chest Pain</span>
                    </label>
                    <label class="flex items-center p-4 bg-white rounded-2xl border-2 border-red-200 hover:border-[var(--emergency-red)] cursor-pointer transition-all shadow-lg">
                        <input type="checkbox" name="emergency" value="Breathing Difficulty" class="w-6 h-6 text-[var(--emergency-red)] rounded-lg mr-4">
                        <span class="text-xl font-semibold text-red-700">Breathing Difficulty</span>
                    </label>
                    <label class="flex items-center p-4 bg-white rounded-2xl border-2 border-red-200 hover:border-[var(--emergency-red)] cursor-pointer transition-all shadow-lg">
                        <input type="checkbox" name="emergency" value="Severe Bleeding" class="w-6 h-6 text-[var(--emergency-red)] rounded-lg mr-4">
                        <span class="text-xl font-semibold text-red-700">Severe Bleeding</span>
                    </label>
                    <label class="flex items-center p-4 bg-white rounded-2xl border-2 border-red-200 hover:border-[var(--emergency-red)] cursor-pointer transition-all shadow-lg">
                        <input type="checkbox" name="emergency" value="High Fever" class="w-6 h-6 text-[var(--emergency-red)] rounded-lg mr-4">
                        <span class="text-xl font-semibold text-red-700">High Fever</span>
                    </label>
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 pt-8">
                <button type="button" onclick="window.location.href='dashboard.html'" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-4 px-8 text-xl font-bold rounded-3xl shadow-lg hover:shadow-xl transition-all">
                    ← Back to Dashboard
                </button>
                <button type="submit" class="flex-1 bg-gradient-to-r from-[var(--primary-green)] to-[var(--dark-green)] text-white py-4 px-8 text-xl font-bold rounded-3xl shadow-2xl hover:shadow-3xl hover:scale-105 transition-all">
                    <i class="fas fa-search"></i> Analyze Symptoms →
                </button>
            </div>
        </form>
    </main>

    <script>
        // Demo data
        const demoData = {
            symptoms: ["Joint Pain", "Stress/Anxiety"],
            description: "Lower back pain for 2 months, worse after sitting. Also feeling anxious.",
            duration: "1-3 months",
            severity: "Moderate (4-6)",
            emergencyFlags: []
        };

        // Toast function
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast bg-${type === 'error' ? 'red' : 'green'}-500 text-white px-6 py-4 rounded-xl shadow-2xl transform translate-x-0 transition-all duration-300`;
            setTimeout(() => {
                toast.classList.add('translate-x-full');
            }, 3000);
        }

        // Load demo
        document.getElementById('demoBtn').onclick = () => {
            document.querySelectorAll('.symptom-btn').forEach(btn => btn.classList.remove('active'));
            demoData.symptoms.forEach(symptom => {
                const btn = Array.from(document.querySelectorAll('.symptom-btn')).find(b => b.dataset.symptom === symptom);
                if (btn) btn.classList.add('active');
            });
            document.getElementById('description').value = demoData.description;
            document.getElementById('duration').value = demoData.duration;
            document.getElementById('severity').value = demoData.severity;
            document.querySelectorAll('input[name="emergency"]').forEach(cb => cb.checked = false);
            updateSymptomCount();
            showToast('Demo data loaded! 🎉');
        };

        // Symptom toggle
        document.querySelectorAll('.symptom-btn').forEach(btn => {
            btn.onclick = () => {
                btn.classList.toggle('active');
                updateSymptomCount();
            };
        });

        function updateSymptomCount() {
            const active = document.querySelectorAll('.symptom-btn.active');
            document.getElementById('symptomCount').textContent = active.length ? 
                `${active.length} symptoms selected` : 'No symptoms selected';
        }

        // Form submit
        document.getElementById('symptomForm').onsubmit = (e) => {
            e.preventDefault();
            
            const symptoms = Array.from(document.querySelectorAll('.symptom-btn.active')).map(btn => btn.dataset.symptom);
            const description = document.getElementById('description').value.trim();
            const duration = document.getElementById('duration').value;
            const severity = document.getElementById('severity').value;
            const emergencyFlags = Array.from(document.querySelectorAll('input[name="emergency"]:checked')).map(cb => cb.value);

            if (symptoms.length === 0 && emergencyFlags.length === 0) {
                showToast('Please select at least one symptom!', 'error');
                return;
            }

            if (!description || !duration || !severity) {
                showToast('Please fill all fields!', 'error');
                return;
            }

            if (emergencyFlags.length > 0) {
                alert('🚨 EMERGENCY DETECTED! Seek immediate medical help.');
                return;
            }

            const symptomData = { symptoms, description, duration, severity, emergencyFlags };
            localStorage.setItem('symptomData', JSON.stringify(symptomData));
            showToast('Symptoms saved! Analyzing...');
            setTimeout(() => {
                window.location.href = 'recommendation.html';
            }, 1000);
        };
    </script>

    <script>
        // Symptom button active styles
        const style = document.createElement('style');
        style.textContent = `
            .symptom-btn.active {
                background-color: #74C69D !important;
                border-color: #2D6A4F !important;
                color: white !important;
                transform: scale(1.05);
                box-shadow: 0 10px 25px rgba(45, 106, 79, 0.3) !important;
            }
            .symptom-btn:hover {
                transform: scale(1.02);
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
