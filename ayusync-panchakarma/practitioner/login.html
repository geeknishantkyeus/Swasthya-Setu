<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Login | AyuSync Practitioner Portal</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-50 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-white/50">
    <div class="text-center mb-10">
      <div class="w-24 h-24 bg-gradient-to-r from-green-500 to-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-4xl text-white shadow-2xl">
        👩‍⚕️
      </div>
      <h1 class="text-4xl font-bold bg-gradient-to-r from-green-800 to-emerald-700 bg-clip-text text-transparent mb-3">
        Practitioner Portal
      </h1>
      <p class="text-gray-600 text-lg">Secure login for doctors only</p>
    </div>

    <!-- Demo Credentials Notice -->
    <div class="bg-yellow-50 border border-yellow-200 rounded-2xl p-4 mb-8 text-sm">
      <strong>Demo Login:</strong><br>
      Email: <code class="bg-yellow-100 px-2 py-1 rounded font-mono">doctor@ayusync.com</code><br>
      Password: <code class="bg-yellow-100 px-2 py-1 rounded font-mono">doctor123</code>
    </div>

    <form id="doctorLoginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input type="email" id="email" required 
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all shadow-sm" 
               placeholder="doctor@ayusync.com">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" id="password" required 
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all shadow-sm" 
               placeholder="Enter your password">
      </div>

      <button type="submit" class="w-full bg-gradient-to-r from-green-600 to-emerald-600 text-white py-4 px-6 rounded-2xl font-bold text-lg shadow-xl hover:shadow-2xl hover:from-green-700 hover:to-emerald-700 transform hover:-translate-y-1 transition-all duration-300 flex items-center justify-center space-x-2">
        <i class="fas fa-sign-in-alt"></i>
        <span>Login as Doctor</span>
      </button>
    </form>

    <div class="mt-8 text-center">
      <p class="text-sm text-gray-600">
        Back to <a href="../index.html" class="text-green-600 hover:underline font-medium">Patient Portal</a>
      </p>
    </div>
  </div>

  <script>
    // Demo login functionality
    document.getElementById('doctorLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Demo credentials
      if (email === 'doctor@ayusync.com' && password === 'doctor123') {
        localStorage.setItem('doctorSession', 'active');
        localStorage.setItem('doctorRole', 'practitioner');
        alert('✅ Login successful! Redirecting to dashboard...');
        window.location.href = 'dashboard.html';
      } else {
        alert('❌ Invalid credentials. Use demo: doctor@ayusync.com / doctor123');
      }
    });

    // Auto-focus email
    document.getElementById('email').focus();
  </script>
</body>
</html>
