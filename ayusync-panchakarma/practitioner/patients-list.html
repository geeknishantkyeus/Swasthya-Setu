<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patients List | AyuSync Practitioner</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="../js/doctor-common.js" defer></script>
  <script type="module" src="../js/doctor-data.js" defer></script>
</head>
<body>
  <!-- Sidebar injected by doctor-common.js -->
  <div class="main-content">
    <div class="max-w-7xl mx-auto p-8">
      <!-- Header -->
      <div class="flex flex-col lg:flex-row lg:items-center justify-between mb-12">
        <div>
          <h1 class="text-4xl font-bold text-gray-800 mb-3">
            <i class="fas fa-users text-green-600 mr-4 text-3xl"></i>
            Patient Management
          </h1>
          <p class="text-xl text-gray-600">Total Patients: <span id="totalPatients" class="font-bold text-green-700">12</span></p>
        </div>
        <button onclick="exportPatients()" class="px-8 py-4 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-2xl font-bold shadow-xl hover:shadow-2xl transform hover:-translate-y-1 transition-all">
          <i class="fas fa-download mr-2"></i>Export List
        </button>
      </div>

      <!-- Search & Filters -->
      <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl p-8 mb-10 border border-white/50">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="relative">
            <i class="fas fa-search absolute left-5 top-5 text-gray-400 text-xl"></i>
            <input type="text" id="patientSearch" placeholder="Search by name, ID, phone..." 
                   class="w-full pl-14 pr-6 py-5 text-lg border-2 border-gray-200 rounded-3xl focus:border-green-500 focus:ring-4 focus:ring-green-100 shadow-xl transition-all">
          </div>
          <select id="conditionFilter" class="px-6 py-5 text-lg border-2 border-gray-200 rounded-3xl focus:border-green-500 transition-all shadow-lg">
            <option>All Conditions</option>
            <option>Joint Pain</option>
            <option>Stress/Anxiety</option>
            <option>Digestion Issues</option>
            <option>Skin Issues</option>
          </select>
          <div class="flex gap-3">
            <button onclick="clearFilters()" class="flex-1 px-6 py-5 bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold rounded-3xl transition-all shadow-lg">
              Clear Filters
            </button>
            <button onclick="addNewPatient()" class="flex-1 px-6 py-5 bg-green-600 text-white font-bold rounded-3xl hover:bg-green-700 shadow-xl transition-all">
              + New Patient
            </button>
          </div>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
        <div class="bg-gradient-to-br from-blue-50 to-blue-100 p-8 rounded-3xl shadow-xl border border-blue-200 text-center">
          <i class="fas fa-user-check text-4xl text-blue-600 mb-4"></i>
          <h3 class="text-3xl font-bold text-blue-800 mb-2" id="activePatients">8</h3>
          <p class="text-blue-700 font-semibold">Active Treatment</p>
        </div>
        <div class="bg-gradient-to-br from-green-50 to-emerald-100 p-8 rounded-3xl shadow-xl border border-green-200 text-center">
          <i class="fas fa-star text-4xl text-green-600 mb-4"></i>
          <h3 class="text-3xl font-bold text-green-800 mb-2" id="avgRating">4.7</h3>
          <p class="text-green-700 font-semibold">Avg Rating</p>
        </div>
        <div class="bg-gradient-to-br from-purple-50 to-violet-100 p-8 rounded-3xl shadow-xl border border-purple-200 text-center">
          <i class="fas fa-calendar-check text-4xl text-purple-600 mb-4"></i>
          <h3 class="text-3xl font-bold text-purple-800 mb-2" id="last30Days">24</h3>
          <p class="text-purple-700 font-semibold">Last 30 Days</p>
        </div>
        <div class="bg-gradient-to-br from-orange-50 to-orange-100 p-8 rounded-3xl shadow-xl border border-orange-200 text-center">
          <i class="fas fa-clock text-4xl text-orange-600 mb-4"></i>
          <div class="text-3xl font-bold text-orange-800 mb-2" id="nextAppts">5</div>
          <p class="text-orange-700 font-semibold">Upcoming</p>
        </div>
      </div>

      <!-- Patients Grid -->
      <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-gradient-to-r from-gray-50 to-gray-100">
              <tr>
                <th class="p-6 text-left font-bold text-lg text-gray-800 border-b-2 border-gray-200">Patient</th>
                <th class="p-6 text-left font-bold text-lg text-gray-800 border-b-2 border-gray-200">Condition</th>
                <th class="p-6 text-left font-bold text-lg text-gray-800 border-b-2 border-gray-200">Last Visit</th>
                <th class="p-6 text-left font-bold text-lg text-gray-800 border-b-2 border-gray-200">Next Appt</th>
                <th class="p-6 text-left font-bold text-lg text-gray-800 border-b-2 border-gray-200">Status</th>
                <th class="p-6 text-left font-bold text-lg text-gray-800 border-b-2 border-gray-200">Rating</th>
                <th class="p-6 text-left font-bold text-lg text-gray-800 border-b-2 border-gray-200">Actions</th>
              </tr>
            </thead>
            <tbody id="patientsTable">
              <!-- Dynamic content -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let filteredPatients = [];

    document.addEventListener('DOMContentLoaded', function() {
      loadPatientsList();
      setupPatientsListeners();
    });

    function loadPatientsList() {
      filteredPatients = [...doctorData.patients];
      updateStats();
      renderPatients();
    }

    function renderPatients() {
      const tbody = document.getElementById('patientsTable');
      const search = document.getElementById('patientSearch').value.toLowerCase();
      const condition = document.getElementById('conditionFilter').value;

      const shown = filteredPatients.filter(p => {
        const nameMatch = p.name.toLowerCase().includes(search);
        const phoneMatch = p.phone.includes(search);
        const idMatch = p.id.toString() === search;
        const conditionMatch = !condition || p.condition === condition;
        return (nameMatch || phoneMatch || idMatch) && conditionMatch;
      });

      document.getElementById('totalPatients').textContent = shown.length;

      tbody.innerHTML = shown.map(patient => `
        <tr class="hover:bg-gray-50 transition-all border-b border-gray-100 h-20">
          <td class="p-6 font-semibold text-gray-800">
            <div class="font-bold text-xl">${patient.name}</div>
            <div class="text-sm text-gray-500">${patient.phone}</div>
          </td>
          <td class="p-6">
            <span class="px-4 py-2 bg-gradient-to-r from-blue-100 to-blue-200 text-blue-800 rounded-xl font-semibold">
              ${patient.condition}
            </span>
            <div class="text-sm text-gray-600">${patient.dosha}</div>
          </td>
          <td class="p-6 text-gray-700 font-medium">${patient.lastVisit}</td>
          <td class="p-6">
            ${patient.nextAppt ? 
              `<span class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm font-semibold">${patient.nextAppt}</span>` : 
              '<span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-sm font-semibold">Pending</span>'
            }
          </td>
          <td class="p-6">
            <span class="px-4 py-2 bg-emerald-100 text-emerald-800 rounded-2xl font-semibold shadow-sm">
              <i class="fas fa-heartbeat mr-2"></i>Active
            </span>
          </td>
          <td class="p-6">
            ${patient.rating ? 
              `<div class="flex items-center">
                <div class="flex text-yellow-400 mr-2">
                  ${'★'.repeat(Math.floor(patient.rating)).padEnd(5, '☆')}
                </div>
                <span class="font-semibold text-gray-800">${patient.rating}</span>
              </div>` : 
              '<span class="text-gray-500">No rating</span>'
            }
          </td>
          <td class="p-6">
            <div class="flex gap-2">
              <a href="patient-detail.html?id=${patient.id}" class="px-5 py-3 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 font-semibold shadow-lg transition-all">
                <i class="fas fa-eye mr-1"></i>View
              </a>
              <button onclick="startConsultation(${patient.id})" class="px-5 py-3 bg-green-600 text-white rounded-2xl hover:bg-green-700 font-semibold shadow-lg transition-all">
                <i class="fas fa-stethoscope mr-1"></i>Consult
              </button>
              <button onclick="viewPrescriptions(${patient.id})" class="px-5 py-3 bg-purple-600 text-white rounded-2xl hover:bg-purple-700 font-semibold shadow-lg transition-all text-xs">
                <i class="fas fa-file-medical mr-1"></i>RX
              </button>
            </div>
          </td>
        </tr>
      `).join('') || `
        <tr>
          <td colspan="7" class="p-20 text-center text-gray-500 text-xl">
            <i class="fas fa-search text-4xl mb-4 block"></i>
            No patients match your search
          </td>
        </tr>
      `;
    }

    function setupPatientsListeners() {
      document.getElementById('patientSearch').addEventListener('input', renderPatients);
      document.getElementById('conditionFilter').addEventListener('change', renderPatients);
    }

    function clearFilters() {
      document.getElementById('patientSearch').value = '';
      document.getElementById('conditionFilter').value = 'All Conditions';
      renderPatients();
    }

    function updateStats() {
      document.getElementById('activePatients').textContent = doctorData.patients.filter(p => p.nextAppt).length;
      document.getElementById('avgRating').textContent = (doctorData.patients.reduce((sum, p) => sum + (p.rating || 0), 0) / doctorData.patients.length).toFixed(1);
      document.getElementById('last30Days').textContent = '24';
      document.getElementById('nextAppts').textContent = doctorData.patients.filter(p => p.nextAppt).length;
    }

    function addNewPatient() {
      showToast('New patient form coming soon!');
    }

    function exportPatients() {
      showToast('Patient list exported to CSV');
      // window.print(); 
    }

    function startConsultation(patientId) {
      window.location.href = `consultation.html?patient=${patientId}`;
    }

    function viewPrescriptions(patientId) {
      window.location.href = `prescription.html?patient=${patientId}`;
    }
  </script>
</body>
</html>
